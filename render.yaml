# Blueprint de Render para K8s-ExpertAdvisor.
# Dos servicios: backend (FastAPI + clipspy sobre Linux) y front estatico.
# Cada push a la rama conectada redespliega automaticamente.

services:
  # ---------- BACKEND: motor CLIPS expuesto por HTTP ----------
  - type: web
    name: k8s-expert-backend
    runtime: python
    rootDir: backend
    plan: free
    # clipspy trae CLIPS en C; en Linux pip instala el wheel precompilado.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /salud
    envVars:
      # clipspy 1.0.6 publica wheels para 3.12; fijamos esa version.
      - key: PYTHON_VERSION
        value: "3.12.8"

  # ---------- FRONTEND: SPA React (Vite) como sitio estatico ----------
  - type: web
    name: k8s-expert-front
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # URL publica del backend. sync:false -> se completa en el dashboard
    # de Render tras el primer deploy del backend (ej: https://k8s-expert-backend.onrender.com).
    envVars:
      - key: VITE_API_URL
        sync: false
    # SPA: cualquier ruta cae en index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
